<style>
:root{
  --bg:#11141C;
  --surface:#1A1F2E;
  --surface-2:#212740;
  --border:#2A3041;
  --text:#F2F1EC;
  --muted:#8A91A8;
  --accent:#FFC233;
  --accent-dim:#5A4A1E;
  --onair:#3DDC84;
  --onair-dim:#173A29;
  --bs:#5FA8E0;
  --bs-dim:#16263A;
  --gray-dim:#262C3D;
  --jp:#E0344C;
  --rerun:#B48AFF;
  --rerun-dim:#2A1F44;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:48px;
}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;}
.display{font-family:-apple-system,'Hiragino Sans',sans-serif;font-stretch:condensed;}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:30;
  background:rgba(17,20,28,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:14px 16px 0 16px;
  padding-top:max(14px,env(safe-area-inset-top));
}
.title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.title-row h1{
  font-family:-apple-system,'Hiragino Sans',sans-serif;
  font-stretch:condensed;
  font-size:19px;font-weight:600;letter-spacing:0.02em;margin:0;text-transform:uppercase;
}
.title-row h1 span{color:var(--accent);}
.clock{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:var(--muted);}

.filters{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:12px;
  -ms-overflow-style:none;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
  font-size:13px;font-weight:500;
  color:var(--muted);
  background:var(--surface);
  border:1px solid var(--border);
  padding:7px 14px;border-radius:999px;white-space:nowrap;cursor:pointer;
  transition:all .15s ease;
}
.chip.active{
  background:var(--accent);color:#1A1306;border-color:var(--accent);font-weight:700;
}

/* ---------- Legend ---------- */
.legend{
  display:flex;gap:14px;flex-wrap:wrap;
  font-size:11px;color:var(--muted);
  padding:10px 16px;border-bottom:1px solid var(--border);
}
.legend i{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:5px;vertical-align:middle;
}

/* ---------- List ---------- */
main{max-width:560px;margin:0 auto;padding:0 0 24px;}
.date-head{
  position:sticky;top:96px;z-index:20;
  background:rgba(17,20,28,0.96);
  backdrop-filter:blur(8px);
  padding:10px 16px 6px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.date-head:hover .d{color:var(--accent);}
.date-head .d{
  font-family:-apple-system,'Hiragino Sans',sans-serif;font-stretch:condensed;
  font-size:15px;font-weight:600;letter-spacing:0.03em;
}
.today-tag{
  font-size:10px;font-weight:700;color:#1A1306;
  background:var(--accent);padding:2px 7px;border-radius:5px;letter-spacing:0.05em;
}

.match{
  display:flex;align-items:stretch;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);position:relative;
}
.match.jp{background:linear-gradient(90deg,rgba(224,52,76,0.10),transparent 60%);}
.match.jp::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--jp);
}
.match.hidden{display:none;}

.time-block{
  flex:0 0 56px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
}
.time-block .t{font-size:17px;font-weight:700;color:var(--accent);}
.time-block .stage{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3;}

.teams-block{flex:1;display:flex;flex-direction:row;align-items:center;gap:4px;min-width:0;}
.teams-names{display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:0;}
.team-line{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:500;}
.scores-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:22px;}
.pk-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:30px;font-size:10px;color:var(--muted);font-family:ui-monospace,'SF Mono',Menlo,monospace;}
.flag-img{
  width:22px;height:15px;flex:0 0 22px;
  border-radius:2px;object-fit:cover;background:#000;
  box-shadow:0 0 0 1px rgba(255,255,255,0.18);
}
.vs{font-size:10px;color:var(--muted);margin-left:1px;}
.jp-tag{font-size:10px;color:var(--jp);font-weight:700;margin-top:2px;}

.status-block{
  flex:0 0 108px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;
}
.badge{
  font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:5px;
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.badge i{display:inline-block;width:6px;height:6px;border-radius:50%;}
.badge.onair{background:var(--onair-dim);color:var(--onair);}
.badge.onair i{background:var(--onair);}
.badge.bs{background:var(--bs-dim);color:var(--bs);}
.badge.bs i{background:var(--bs);}
.badge.net{background:var(--accent-dim);color:var(--accent);}
.badge.net i{background:var(--accent);}
.badge.gray{background:var(--gray-dim);color:var(--muted);}
.badge.gray i{background:var(--muted);}
.badge.rerun{background:var(--rerun-dim);color:var(--rerun);}
.badge.rerun i{background:var(--rerun);}
.net-tag{font-size:9.5px;color:var(--accent);font-weight:700;}

.score{
  font-size:15px;font-weight:700;
  color:var(--accent);
  font-family:ui-monospace,'SF Mono',Menlo,monospace;
  line-height:1.4;
  flex-shrink:0;
}

.live-circle{
  display:inline-flex;align-items:center;justify-content:center;
  padding:3px 10px;height:22px;border-radius:999px;
  background:var(--onair-dim);color:var(--onair);
  font-size:10px;font-weight:800;
  border:2px solid var(--onair);
  margin-top:4px;
  animation:livepulse 1.5s ease-in-out infinite;
}
@keyframes livepulse{
  0%,100%{box-shadow:0 0 0 0 rgba(61,220,132,0.5);}
  50%{box-shadow:0 0 0 6px rgba(61,220,132,0);}
}

footer{
  max-width:560px;margin:24px auto 0;padding:0 18px;
  font-size:11px;color:var(--muted);line-height:1.7;
}
footer a{color:var(--bs);}

.section-empty{
  text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;
}

.scrolltop{
  position:fixed;right:16px;bottom:20px;z-index:25;
  background:var(--accent);color:#1A1306;border:none;
  width:42px;height:42px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.4);
}

.day-nav{
  position:sticky;top:96px;z-index:21;
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:12px 16px;
  background:rgba(17,20,28,0.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.day-nav.hidden{display:none;}
.nav-arrow{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  width:36px;height:36px;border-radius:50%;font-size:14px;flex:0 0 36px;cursor:pointer;
}
.nav-arrow:disabled{opacity:.25;}
.day-label{font-size:17px;font-weight:600;min-width:130px;text-align:center;}
.today-btn{
  font-size:11.5px;font-weight:700;color:var(--accent);background:none;
  border:1px solid var(--accent-dim);border-radius:999px;padding:6px 12px;cursor:pointer;
}

.japan-countdown{
  background:linear-gradient(135deg,rgba(224,52,76,0.15),rgba(0,63,138,0.15));
  border:1px solid rgba(224,52,76,0.3);
  border-radius:10px;padding:12px 16px;
  max-width:560px;margin:10px auto;
  display:flex;align-items:center;justify-content:space-between;
}
.japan-countdown.hidden{display:none;}
/* 日本戦フィルター時: ヘッダー直下にstickyで常時表示 */
.japan-countdown.pinned{
  position:sticky;
  top:96px;z-index:22;
  border-radius:0;margin:0;max-width:100%;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
/* 日本戦フィルター時: date-headをカウントダウン分だけ下げてかぶらないよう調整 */
body.japan-filter .date-head{ top:162px; }
.jc-label{font-size:11px;color:var(--muted);margin-bottom:3px;}
.jc-match{font-size:13px;font-weight:600;color:var(--text);}
.jc-time{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:22px;font-weight:700;color:var(--jp);letter-spacing:0.04em;}

.theme-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);font-size:16px;
  width:32px;height:32px;border-radius:50%;cursor:pointer;flex:0 0 32px;
  display:flex;align-items:center;justify-content:center;
}

/* ライトテーマ */
body.light{
  --bg:#F0F4FF;--surface:#FFFFFF;--surface-2:#E8EDF8;--border:#C8D0E8;
  --text:#0D1B6E;--muted:#5566AA;--accent:#003F8A;--accent-dim:#C8D8F0;
  --onair:#006633;--onair-dim:#D0F0E0;--bs:#003F8A;--bs-dim:#D0E4F8;
  --gray-dim:#E0E4F0;--jp:#C0002A;--rerun:#7C3AED;--rerun-dim:#EDE9FE;
}
body.light header{background:rgba(240,244,255,0.95);}
body.light .date-head{background:rgba(240,244,255,0.97);}
body.light .day-nav{background:rgba(240,244,255,0.97);}
body.light .chip{color:#0D1B6E;background:#FFFFFF;border-color:#C8D0E8;}
body.light .chip.active{background:#003F8A;color:#FFFFFF;border-color:#003F8A;}
body.light .today-tag{background:var(--accent);color:#FFFFFF;}
body.light .date-head .d{color:var(--text);}
/* ライトモードは濃い青丸・白矢印 */
body.light .scrolltop{background:var(--accent);color:#FFFFFF;}

/* ローディング/エラー */
.loading-msg{
  text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;
}
.loading-msg .icon{font-size:32px;margin-bottom:12px;}
</style>
</head>

// ============================================================
// 国旗 HTML を生成
// ============================================================
function flagHtml(teamName) {
  const code = TEAM_FLAG[teamName];
  if (!code) return `<span style="width:22px;height:15px;flex:0 0 22px;display:inline-block;"></span>`;
  return `<img class="flag-img" src="https://flagcdn.com/${code}.svg" alt="${teamName}" loading="lazy" onerror="this.style.display='none'">`;
}

// ============================================================
// 日付文字列から曜日を取得
// ============================================================
function getDayLabel(dateStr) {
  const [m, d] = dateStr.split("/").map(Number);
  const dt = new Date(2026, m - 1, d);
  return WEEKDAYS[dt.getDay()];
}

// ============================================================
// データを日付でグループ化
// ============================================================
function groupByDate(matches) {
  const map = new Map();
  for (const m of matches) {
    if (!map.has(m.date)) {
      map.set(m.date, { date: m.date, day: getDayLabel(m.date), matches: [] });
    }
    map.get(m.date).matches.push(m);
  }
  // 日付順にソート
  return [...map.values()].sort((a, b) => {
    const [am, ad] = a.date.split("/").map(Number);
    const [bm, bd] = b.date.split("/").map(Number);
    return (am * 32 + ad) - (bm * 32 + bd);
  });
}

// ============================================================
// ステータスバッジを生成
// 各放送局バッジにLIVE/録画/再放送をインライン表示する
// ============================================================
function buildStatusBadge(match) {
  const hasOnair = match.tv_onair && match.tv_onair.length > 0;
  const hasBs    = match.tv_bs   && match.tv_bs.length   > 0;
  const hasRec   = match.tv_bsp4k && !match.bsp4k_live;
  const liveBroadcast = match.is_live_broadcast !== undefined
    ? match.is_live_broadcast
    : (hasOnair || hasBs);

  // BSP4K録画バッジ（地上波と並列表示の場合）
  let recBadge = "";
  if (hasRec) {
    if (match.bsp4k_time) {
      recBadge = `<div class="badge bs" style="margin-top:3px;font-size:9px;"><i></i>BSP4K 録画${match.bsp4k_time}</div>`;
    } else if (!liveBroadcast) {
      recBadge = `<div class="badge bs" style="margin-top:3px;font-size:9px;"><i></i>BSP4K 録画${match.time}</div>`;
    }
  }

  // BSP4K再放送バッジ
  const rerunBadge = match.bsp4k_rerun_time
    ? `<div class="badge rerun" style="margin-top:3px;font-size:9px;"><i></i>BSP4K 再放送 ${match.bsp4k_rerun_time}</div>`
    : "";

  if (hasOnair) {
    let html = `<div class="badge onair"><i></i>${match.tv_onair.join("・")} LIVE</div>`;
    if (hasBs) {
      html += `<div class="badge bs" style="margin-top:3px;font-size:9px;"><i></i>${match.tv_bs.join("・")} LIVE</div>`;
    } else if (match.tv_bsp4k && match.bsp4k_live) {
      html += `<div class="badge bs" style="margin-top:3px;font-size:9px;"><i></i>BSP4K LIVE</div>`;
    }
    return html + recBadge + rerunBadge;
  }
  if (hasBs) {
    let html = `<div class="badge bs"><i></i>${match.tv_bs.join("・")} LIVE</div>`;
    if (match.tv_bsp4k && match.bsp4k_live) {
      html += `<div class="badge bs" style="margin-top:3px;font-size:9px;"><i></i>BSP4K LIVE</div>`;
    }
    return html + recBadge + rerunBadge;
  }
  if (match.tv_bsp4k) {
    if (match.bsp4k_live) {
      return `<div class="badge bs"><i></i>BSP4K LIVE</div>` + rerunBadge;
    } else {
      const t = match.bsp4k_time || match.time;
      return `<div class="badge bs"><i></i>BSP4K 録画${t}</div>` + rerunBadge;
    }
  }
  if (match.tv_net && match.tv_net.length > 0) {
    return match.tv_net.map(n => `<div class="badge net"><i></i>${n}</div>`).join("");
  }
  return `<div class="badge gray"><i></i>地上波未定</div>`;
}

function buildList() {

  if (!DAYS.length) {
    list.innerHTML = `<div class="section-empty">試合データがありません</div>`;
    return;
  }

  // フィルターchipの「全XX試合」を更新

  if (allChip) allChip.textContent = `全${MATCHES.length}試合`;

  let html = "";
  const todayKey = todayDateStr();
  const TERRESTRIAL = new Set(["NHK","日テレ","フジテレビ","テレビ朝日","TBS"]);

  for (const group of DAYS) {
    const isToday = group.date === todayKey;
    html += `<div class="date-head" data-date="${group.date}">
      <span class="d">${group.date}（${group.day}）</span>
      ${isToday ? `<span class="today-tag">TODAY</span>` : ""}
    </div>`;

    for (const m of group.matches) {
      const hasOnair = m.tv_onair && m.tv_onair.length > 0;
      const stageText = m.note
        ? `${m.stage}<br><span style="opacity:.7">${m.note}</span>`
        : m.stage;
      const hasScore = m.score && m.score.home !== undefined;
      const hasPK    = m.score && m.score.pk_home !== undefined;
      const scoresCol = hasScore
        ? `<div class="scores-col"><div class="score">${m.score.home}</div><div class="score">${m.score.away}</div></div>`
        : "";
      const pkCol = hasPK
        ? `<div class="pk-col"><div>${m.score.pk_home}PK</div><div>${m.score.pk_away}PK</div></div>`
        : "";

      html += `<div class="match${m.is_japan ? " jp" : ""}"
        data-date="${m.date}"
        data-time="${m.time}"
        data-jp="${m.is_japan}"
        data-onair="${hasOnair}">
        <div class="time-block">
          <div class="t mono">${m.time}</div>
          <div class="stage">${stageText}</div>
        </div>
        <div class="teams-block">
          <div class="teams-names">
            <div class="team-line">${flagHtml(m.team1)}<span>${m.team1}</span></div>
            <div class="team-line"><span class="vs">vs</span>${flagHtml(m.team2)}<span>${m.team2}</span></div>
            ${m.is_japan ? `<div class="jp-tag">🇯🇵 日本代表戦</div>` : ""}
          </div>
          ${scoresCol}${pkCol}
        </div>
        <div class="status-block">
          ${buildStatusBadge(m)}
        </div>
      </div>`;
    }

  }

  list.innerHTML = html;

  // 日付ヘッダークリック → 日付フィルターに切替
  list.addEventListener("click", function(e) {
    const head = e.target.closest(".date-head");
    if (!head) return;
    const date = head.dataset.date;
    const idx = DAYS.findIndex(g => g.date === date);
    if (idx < 0) return;
    dayIndex = idx;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    document.querySelector('.chip[data-filter="date"]').classList.add("active");
    applyFilter("date");
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

// ============================================================
// 日付比較用ヘルパー
// ============================================================
function dateVal(str) {
  const [m, d] = str.split("/").map(Number);
  return m * 32 + d;
}
function todayDateStr() {
  const now = new Date();
  return `${now.getMonth() + 1}/${now.getDate()}`;
}
function defaultDayIndex() {
  const tv = dateVal(todayDateStr());
  let idx = DAYS.findIndex(g => dateVal(g.date) >= tv);
  return idx === -1 ? Math.max(0, DAYS.length - 1) : idx;
}

let dayIndex = 0;
let currentFilter = "all"; // 現在アクティブなフィルター

// ============================================================
// 日付ナビゲーション描画
// scrollToTop=true のとき画面トップへスクロール（前後ボタン・今日ボタン用）
// ============================================================
function renderDayNav(scrollToTop = false) {
  if (!DAYS.length) return;
  const group = DAYS[dayIndex];
  const tk = todayDateStr();
  const isToday = group.date === tk;
  document.getElementById("dayLabel").innerHTML =
    `${group.date}（${group.day}）${isToday ? `<span class="today-tag" style="margin-left:6px;">TODAY</span>` : ""}`;
  document.getElementById("prevDay").disabled = dayIndex <= 0;
  document.getElementById("nextDay").disabled = dayIndex >= DAYS.length - 1;

  document.querySelectorAll(".date-head").forEach(h => h.classList.add("hidden"));
  document.querySelectorAll(".match").forEach(el => {
    el.classList.toggle("hidden", el.dataset.date !== group.date);
  });

  if (scrollToTop) {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

// ============================================================
// フィルター適用
// ============================================================
function applyFilter(f) {
  currentFilter = f;
  document.getElementById("dayNav").classList.toggle("hidden", f !== "date");

  // カウントダウンのpinned/表示制御
  const jcEl = document.getElementById("japanCountdown");
  if (f === "jp") {
    // 日本戦フィルター: stickyで常時表示（updateCountdownが次試合有無で制御）
    document.body.classList.add("japan-filter");
    jcEl.classList.add("pinned");
  } else {
    document.body.classList.remove("japan-filter");
    jcEl.classList.remove("pinned");
    jcEl.classList.add("hidden");
  }

  if (f === "date") {
    renderDayNav(false); // スクロールは呼び出し元（チップ/ボタン）が制御
    return;
  }
  document.querySelectorAll(".date-head").forEach(h => h.classList.remove("hidden"));
  document.querySelectorAll(".match").forEach(el => {
    let show = true;
    if (f === "jp")    show = el.dataset.jp    === "true";
    else if (f === "onair") show = el.dataset.onair === "true";
    el.classList.toggle("hidden", !show);
  });
  document.querySelectorAll(".date-head").forEach(h => {
    const date = h.dataset.date;
    const visible = document.querySelectorAll(`.match[data-date="${date}"]:not(.hidden)`).length;
    h.classList.toggle("hidden", visible === 0);
  });
}

function tickClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("clock").textContent =
    `${now.getMonth() + 1}/${now.getDate()} ${hh}:${mm}`;
}

// ============================================================
// 日本戦カウントダウン
// ============================================================
function updateCountdown() {
  const now = new Date();
  const el = document.getElementById("japanCountdown");

  // 日本戦フィルター選択時のみカウントダウンを表示
  if (currentFilter !== "jp") {
    el.classList.add("hidden");
    return;
  }

  const next = MATCHES.find(m => {
    if (!m.is_japan) return false;
    const [h, min] = m.time.split(":").map(Number);
    const [mo, d] = m.date.split("/").map(Number);
    const t = new Date(2026, mo - 1, d, h, min);
    return t > now;
  });

  if (!next) { el.classList.add("hidden"); return; }

  const [h, min] = next.time.split(":").map(Number);
  const [mo, d] = next.date.split("/").map(Number);
  const target = new Date(2026, mo - 1, d, h, min);
  const diff = Math.max(0, target - now);

  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);

  document.getElementById("jcMatch").textContent = `${next.team1} vs ${next.team2}`;
  document.getElementById("jcTime").textContent = days > 0
    ? `${days}日 ${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`
    : `${String(hours).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  el.classList.remove("hidden");
}

// ============================================================
// 初期化（fetch → インラインデータの順でフォールバック）
// ローカルで直接開いた場合: fetchがCORSで失敗 → INLINE_MATCHESを使用
// Netlifyなどサーバー上: fetchが成功 → matches.jsonの最新データを使用
// ============================================================
// 今日（または今日以降の最初の表示中セクション）へスクロール
// smooth=true のときアニメーションあり（フィルター切替時）、false は即座（起動時）
function scrollToToday(smooth = false) {
  const todayV = dateVal(todayDateStr());
  const heads = Array.from(document.querySelectorAll(".date-head:not(.hidden)"));
  // 今日以降で最初の表示中date-headを探す
  let target = heads.find(el => el.dataset.date && dateVal(el.dataset.date) >= todayV);
  // なければ最後の表示中date-head（大会終了後など）
  if (!target) target = heads[heads.length - 1];
  if (!target) return;
  const headerHeight = document.querySelector("header")?.offsetHeight ?? 96;
  const y = target.getBoundingClientRect().top + window.scrollY - headerHeight;
  window.scrollTo({ top: Math.max(0, y), behavior: smooth ? "smooth" : "instant" });
}

function initWithData(data) {
  MATCHES = data;
  DAYS = groupByDate(MATCHES);
  dayIndex = defaultDayIndex();
  buildList();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  // DOMが描画された後、今日の日付セクションへ即座にスクロール（アニメーションなし）
  requestAnimationFrame(() => scrollToToday(false));
}

async function loadMatches() {
  try {
    const res = await fetch("matches.json?" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    console.log("✅ matches.json をfetchで取得しました（" + data.length + "試合）");
    initWithData(data);
  } catch (e) {
    // ローカルファイルをブラウザで直接開いた場合はCORSエラーになるため
    // インラインデータにフォールバックする
    console.info("fetchできなかったためインラインデータを使用します:", e.message);
    initWithData(INLINE_MATCHES);
  }
}

// 時計スタート
tickClock();
setInterval(tickClock, 30000);

// データ読み込み開始
loadMatches();
</script>
</body>
